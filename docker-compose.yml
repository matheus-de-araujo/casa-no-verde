services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: casa_no_azul
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: casa_no_azul
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  scheduler:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      - mysql

volumes:
  mysql-data:
